# Global settings
events { worker_connections 1024; }

http {
  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name jenkins.local registry.local auth.local;
    return 301 https://$host$request_uri;
  }

  # Shared TLS config
  ssl_certificate     /etc/nginx/certs/server.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  # ── Jenkins ──────────────────────────────────
  server {
    listen 443 ssl;
    server_name jenkins.local;

    # Jenkins needs large uploads for plugin installs / artifacts
    client_max_body_size 100M;

    location / {
      proxy_pass         http://jenkins:8080;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;

      # Required for Jenkins WebSocket (build log streaming)
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_read_timeout 90;
    }
  }

  # ── Docker Registry ──────────────────────────
  server {
    listen 443 ssl;
    server_name registry.local;

    # Registry needs large uploads (Docker layers can be gigabytes)
    client_max_body_size 0;
    chunked_transfer_encoding on;

    location / {
      proxy_pass         http://registry:5000;
      proxy_set_header   Host              $http_host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_read_timeout 900;
    }
  }

  # ── Keycloak ─────────────────────────────────
  server {
    listen 443 ssl;
    server_name auth.local;

    location / {
      proxy_pass         http://keycloak:8080;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_buffer_size  128k;
      proxy_buffers      4 256k;
    }
  }
}
